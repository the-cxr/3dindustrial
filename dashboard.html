<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Área do Cliente - Sua Empresa de Inox</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-sair { background: #ff4444; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bem-vindo, <span id="userName">Cliente</span>!</h1>
        <p>Você está conectado à sua conta industrial.</p>
        <p>Aqui você poderá ver seus pedidos de materiais em inox e gerenciar suas compras.</p>
        <button class="btn-sair" onclick="sair()">Sair da Conta</button>
    </div>

    <script>
        // Recupera o nome que o Python enviou e salvamos no navegador
        const nome = localStorage.getItem('usuarioNome');
        if (!nome) {
            window.location.href = "index.html"; // Se não tiver logado, volta pro início
        }
        document.getElementById('userName').innerText = nome;

        function sair() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
