<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Dados | 3D Industrial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #f4f4f4;">

<section class="container-dados">
    <div class="card-dados">
        <div class="header-dados">
            <h2><i class="fas fa-user-edit"></i> Meus Dados Pessoais</h2>
            <p>Gerencie suas informações de contato e segurança.</p>
        </div>

        <form id="formMeusDados">
            <div class="grid-inputs">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="perfilNome" value="Carregando...">
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="perfilEmail" disabled style="background: #eee; cursor: not-allowed;">
                    <small>O e-mail não pode ser alterado por segurança.</small>
                </div>
                <div class="input-group">
    <label>CPF ou CNPJ:</label>
    <input type="text" id="editDocumento" 
           oninput="formatarDocumento(this)" 
           maxlength="18" 
           placeholder="000.000.000-00">
                </div>
                <div class="input-group">
                    <label>Data de Nascimento</label>
                    <input type="date" id="perfilNasc">
                </div>
                <div class="input-group">
                    <label>Telefone / WhatsApp</label>
                    <input type="tel" id="perfilTel" placeholder="(49) 99999-9999">
                </div>
            </div>

            <div class="botoes-acao">
                <button type="button" class="btn-cancelar" onclick="window.location.href='index.html'">VOLTAR</button>
                <button type="submit" class="btn-salvar">SALVAR ALTERAÇÕES</button>
            </div>
        </form>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
